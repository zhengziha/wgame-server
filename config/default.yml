# wgame-server 配置文件
# 优先级：命令行参数 > 环境变量 > 配置文件 > 默认值

# 服务器配置
server:
  addr: ":8800"  # TCP 监听地址

# 游戏数据库配置（主数据源）
game_db:
  driver: "sqlite"           # 数据库驱动：sqlite | mysql | postgres
  dsn: ""                    # 数据库 DSN（为空时使用驱动默认值）
  log_level: 2               # GORM 日志级别：1 Silent, 2 Error, 3 Warn, 4 Info
  max_open_conns: 0          # 最大打开连接数（0=驱动默认）
  max_idle_conns: 0          # 最大空闲连接数（0=驱动默认）
  conn_max_lifetime: 0       # 连接最大生命周期（秒，0=驱动默认）

# 认证数据库配置（独立数据源）
auth_db:
  driver: "sqlite"           # 数据库驱动：sqlite | mysql | postgres
  dsn: ""                    # 数据库 DSN
  log_level: 2               # GORM 日志级别
  max_open_conns: 0          # 最大打开连接数
  max_idle_conns: 0          # 最大空闲连接数
  conn_max_lifetime: 0       # 连接最大生命周期

# 缓存配置
cache:
  driver: "redis"            # 缓存驱动：redis | memory | none
  redis:
    addr: "127.0.0.1:6379"   # Redis 地址
    password: ""             # Redis 密码
    db: 0                    # Redis 逻辑数据库
    pool_size: 16            # Redis 连接池大小

# 日志配置
log:
  level: "info"              # 日志级别：debug | info | warn | error
